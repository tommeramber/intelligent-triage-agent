# ⚠️  PHASE-1 APPROACH — for demo / local cluster only.
#
# The API key is stored as a base64-encoded Kubernetes Secret.
# This is better than a plain ConfigMap but the value is NOT encrypted at rest
# by default (unless your cluster has etcd encryption enabled).
#
# PHASE-2 improvements (choose one):
#   A. HashiCorp Vault + Vault Agent Sidecar Injector
#   B. External Secrets Operator (ESO) + AWS Secrets Manager / Azure Key Vault
#   C. Sealed Secrets (Bitnami) — safe to commit encrypted YAML to git
#   D. OpenShift built-in "Credentials" / OCP Vault integration
#
# To generate the base64 value:
#   echo -n "sk-your-actual-key" | base64
#
# DO NOT commit this file with a real key. The placeholder below is safe.

apiVersion: v1
kind: Secret
metadata:
  name: triage-agent-secret
  namespace: triage-agent
  labels:
    app.kubernetes.io/name: triage-agent
    app.kubernetes.io/component: secret
type: Opaque
data:
  # Replace with: echo -n "sk-your-real-key" | base64
  OPENAI_API_KEY: c2steW91ci1rZXktaGVyZQ==   # base64("sk-your-key-here")
