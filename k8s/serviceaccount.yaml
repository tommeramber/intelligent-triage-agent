apiVersion: v1
kind: ServiceAccount
metadata:
  name: triage-agent-sa
  namespace: triage-agent
  labels:
    app.kubernetes.io/name: triage-agent
  annotations:
    openshift.io/description: "Dedicated SA for triage-agent — no K8s API access, token not auto-mounted"
    # Phase 2: uncomment to use IRSA (AWS) or Workload Identity (GKE/Azure)
    # to avoid mounting long-lived cloud credentials inside the pod.
    # eks.amazonaws.com/role-arn: "arn:aws:iam::ACCOUNT_ID:role/triage-agent-role"

# Disable auto-mounting of the default service account token.
# The triage agent does not need to call the Kubernetes API,
# so mounting the token would be unnecessary attack surface.
automountServiceAccountToken: false
