apiVersion: v1
kind: ServiceAccount
metadata:
  name: triage-agent-sa
  namespace: triage-agent
  labels:
    app.kubernetes.io/name: triage-agent
  annotations:
    openshift.io/description: "Dedicated SA for triage-agent — scoped read-only K8s API via RBAC"
    # Phase 2: uncomment to use IRSA (AWS) or Workload Identity (GKE/Azure)
    # eks.amazonaws.com/role-arn: "arn:aws:iam::ACCOUNT_ID:role/triage-agent-role"

# SA-level default: do not auto-mount on unrelated pods.
# deployment.yaml sets automountServiceAccountToken: true on the triage-agent pod only.
automountServiceAccountToken: false
