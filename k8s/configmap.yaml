apiVersion: v1
kind: ConfigMap
metadata:
  name: triage-agent-config
  namespace: triage-agent
  labels:
    app.kubernetes.io/name: triage-agent
    app.kubernetes.io/component: config
data:
  # Non-sensitive runtime configuration.
  # Sensitive values (API keys) live in the Secret, not here.
  OPENAI_MODEL: "gpt-4o-mini"
  LLM_MAX_TOKENS: "1024"
  LLM_TEMPERATURE: "0.2"
  AGENT_MAX_ITERATIONS: "3"
  DOCS_FILE_PATH: "/app/data/troubleshooting_docs.json"
  APP_PORT: "8080"
  APP_VERSION: "1.0.0"
  LOG_LEVEL: "info"

---
# The troubleshooting knowledge base is mounted as a ConfigMap volume.
# This lets you update the docs without rebuilding the image:
#   kubectl create configmap triage-kb --from-file=troubleshooting_docs.json=data/troubleshooting_docs.json \
#     -n triage-agent --dry-run=client -o yaml | kubectl apply -f -
#
# Note: after updating this ConfigMap, the Python module-level cache (_DOCS_CACHE)
# will NOT auto-refresh. Either restart the pod or add inotify watching (Phase 2).
apiVersion: v1
kind: ConfigMap
metadata:
  name: triage-kb
  namespace: triage-agent
  labels:
    app.kubernetes.io/name: triage-agent
    app.kubernetes.io/component: knowledge-base
data:
  troubleshooting_docs.json: |
    {
      "_comment": "Managed by ConfigMap triage-kb. Edit here to update docs without an image rebuild.",
      "_version": "1.0.0",
      "entries": []
    }
